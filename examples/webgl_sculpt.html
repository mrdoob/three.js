<!DOCTYPE html>
<html lang="en">
	<head>
		<title>three.js webgl - sculpt</title>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
		<link type="text/css" rel="stylesheet" href="main.css">
		<style>
			.cursor-circle {
				position: absolute;
				border: 1.5px solid rgba(255,255,255,0.6);
				border-radius: 50%;
				pointer-events: none;
				transform: translate(-50%, -50%);
			}
		</style>
	</head>
	<body>

		<div id="info">
			<a href="https://threejs.org" target="_blank" rel="noopener">three.js</a> webgl - sculpt
		</div>

		<div class="cursor-circle" id="cursorCircle"></div>

		<script type="importmap">
			{
				"imports": {
					"three": "../build/three.module.js",
					"three/addons/": "./jsm/"
				}
			}
		</script>

		<script type="module">

			import * as THREE from 'three';
			import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
			import { Sculpt } from 'three/addons/sculpt/Sculpt.js';
			import { GUI } from 'three/addons/libs/lil-gui.module.min.js';

			let renderer, scene, camera, controls, sculpt, mesh;

			init();

			function init() {

				// Renderer

				renderer = new THREE.WebGLRenderer( { antialias: true } );
				renderer.setPixelRatio( window.devicePixelRatio );
				renderer.setSize( window.innerWidth, window.innerHeight );
				renderer.setAnimationLoop( animate );
				document.body.appendChild( renderer.domElement );

				// Scene

				scene = new THREE.Scene();
				scene.background = new THREE.Color( 0x222222 );

				// Camera

				camera = new THREE.PerspectiveCamera( 45, window.innerWidth / window.innerHeight, 0.1, 100 );
				camera.position.set( 0, 0, 4 );

				// Lights

				scene.add( new THREE.AmbientLight( 0x404040 ) );

				const dirLight = new THREE.DirectionalLight( 0xffffff, 2.0 );
				dirLight.position.set( 1, 1.5, 2 );
				scene.add( dirLight );

				const dirLight2 = new THREE.DirectionalLight( 0x88aaff, 0.5 );
				dirLight2.position.set( - 1, - 0.5, - 1 );
				scene.add( dirLight2 );

				// Mesh

				const geometry = new THREE.IcosahedronGeometry( 1, 5 );
				const material = new THREE.MeshStandardMaterial( {
					color: 0xcc6644,
					roughness: 0.4,
					metalness: 0.1
				} );
				mesh = new THREE.Mesh( geometry, material );
				scene.add( mesh );

				// Controls

				controls = new OrbitControls( camera, renderer.domElement );
				controls.enableDamping = true;
				controls.dampingFactor = 0.1;

				// Sculpt

				sculpt = new Sculpt( mesh, camera, renderer.domElement );

				// Disable orbit controls while sculpting

				renderer.domElement.addEventListener( 'pointerdown', function () {

					requestAnimationFrame( function () {

						if ( sculpt.isSculpting ) controls.enabled = false;

					} );

				} );

				renderer.domElement.addEventListener( 'pointerup', function () {

					controls.enabled = true;

				} );

				// GUI

				const params = {
					tool: 'brush',
					radius: 50,
					intensity: 0.5,
					subdivision: 0.75,
					decimation: 0,
					negative: false,
					wireframe: false
				};

				const gui = new GUI();

				gui.add( params, 'tool', [ 'brush', 'inflate', 'smooth', 'flatten', 'pinch', 'crease', 'drag', 'scale' ] ).onChange( function ( value ) {

					sculpt.tool = value;

				} );

				gui.add( params, 'radius', 10, 200 ).onChange( function ( value ) {

					sculpt.radius = value;

				} );

				gui.add( params, 'intensity', 0, 1 ).onChange( function ( value ) {

					sculpt.intensity = value;

				} );

				gui.add( params, 'subdivision', 0, 1 ).onChange( function ( value ) {

					sculpt.subdivision = value;

				} );

				gui.add( params, 'decimation', 0, 1 ).onChange( function ( value ) {

					sculpt.decimation = value;

				} );

				gui.add( params, 'negative' ).onChange( function ( value ) {

					sculpt.negative = value;

				} );

				gui.add( params, 'wireframe' ).onChange( function ( value ) {

					mesh.material.wireframe = value;

				} );

				// Cursor circle

				const cursorCircle = document.getElementById( 'cursorCircle' );
				renderer.domElement.addEventListener( 'pointermove', function ( event ) {

					const size = sculpt.radius * 2;
					cursorCircle.style.width = size + 'px';
					cursorCircle.style.height = size + 'px';
					cursorCircle.style.left = event.clientX + 'px';
					cursorCircle.style.top = event.clientY + 'px';

				} );

				// Resize

				window.addEventListener( 'resize', onWindowResize );

			}

			function onWindowResize() {

				camera.aspect = window.innerWidth / window.innerHeight;
				camera.updateProjectionMatrix();
				renderer.setSize( window.innerWidth, window.innerHeight );

			}

			function animate() {

				controls.update();
				renderer.render( scene, camera );

			}

		</script>
	</body>
</html>
