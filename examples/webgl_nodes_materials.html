<!DOCTYPE html>
<html lang="en">
	<head>
		<title>three.js webgl - legacy renderer with multiple NodeMaterials</title>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
		<link type="text/css" rel="stylesheet" href="example.css">
	</head>
	<body>

		<div id="info">
			<a href="https://threejs.org/" target="_blank" rel="noopener" class="logo-link"></a>

			<div class="title-wrapper">
				<a href="https://threejs.org/" target="_blank" rel="noopener">three.js</a><span>WebGL Legacy - Multiple NodeMaterials</span>
			</div>

			<small>Three objects with different NodeMaterial types on legacy WebGLRenderer</small>
		</div>

		<script type="importmap">
			{
				"imports": {
					"three": "../build/three.module.js",
					"three/tsl": "../build/three.tsl.js",
					"three/addons/": "./jsm/"
				}
			}
		</script>

		<script type="module">

			import * as THREE from 'three';
			import { MeshBasicNodeMaterial, MeshStandardNodeMaterial, MeshPhongNodeMaterial } from 'three/tsl';
			import { time, vec2, uv, texture, mix, checker, normalLocal, positionLocal, color, oscSine } from 'three/tsl';
			import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
			import { WebGLRendererWithNodes } from 'three/addons/renderers/WebGLRendererWithNodes.js';

			let camera, scene, renderer;
			let box, sphere, torus;

			init();

			function init() {

				camera = new THREE.PerspectiveCamera( 70, window.innerWidth / window.innerHeight, 0.1, 100 );
				camera.position.z = 5;

				scene = new THREE.Scene();
				scene.background = new THREE.Color( 0x222222 );

				// Renderer - Using legacy WebGLRenderer with NodeMaterial support
				renderer = new WebGLRendererWithNodes( { antialias: true } );
				renderer.setPixelRatio( window.devicePixelRatio );
				renderer.setSize( window.innerWidth, window.innerHeight );
				document.body.appendChild( renderer.domElement );

				// Box with MeshBasicNodeMaterial + texture
				const geometryBox = new THREE.BoxGeometry();
				const materialBox = new MeshBasicNodeMaterial();

				// Load texture
				const textureLoader = new THREE.TextureLoader();
				const uvTexture = textureLoader.load( './textures/uv_grid_opengl.jpg' );
				uvTexture.wrapS = THREE.RepeatWrapping;
				uvTexture.wrapT = THREE.RepeatWrapping;

				// Animated UV
				const timerScaleNode = time.mul( vec2( - 0.5, 0.1 ) );
				const animateUV = uv().add( timerScaleNode );

				const textureNode = texture( uvTexture, animateUV );

				materialBox.colorNode = mix( textureNode, checker( animateUV ), 0.5 );

				box = new THREE.Mesh( geometryBox, materialBox );
				box.position.x = - 2;
				scene.add( box );

				// Sphere with MeshStandardNodeMaterial + normal-based coloring
				const geometrySphere = new THREE.SphereGeometry( 0.75, 32, 32 );
				const materialSphere = new MeshStandardNodeMaterial();

				// Use normals to create a gradient effect
				const normalColor = normalLocal.mul( 0.5 ).add( 0.5 );
				materialSphere.colorNode = normalColor;
				materialSphere.roughness = 0.3;
				materialSphere.metalness = 0.8;

				sphere = new THREE.Mesh( geometrySphere, materialSphere );
				sphere.position.x = 0;
				scene.add( sphere );

				// Torus with MeshPhongNodeMaterial + animated color
				const geometryTorus = new THREE.TorusGeometry( 0.5, 0.2, 16, 100 );
				const materialTorus = new MeshPhongNodeMaterial();

				// Animated color using sine wave
				const redChannel = oscSine( time.mul( 0.5 ) ).mul( 0.5 ).add( 0.5 );
				const greenChannel = oscSine( time.mul( 0.7 ).add( 1.0 ) ).mul( 0.5 ).add( 0.5 );
				const blueChannel = oscSine( time.mul( 0.9 ).add( 2.0 ) ).mul( 0.5 ).add( 0.5 );

				materialTorus.colorNode = color( redChannel, greenChannel, blueChannel );
				materialTorus.shininess = 100;

				torus = new THREE.Mesh( geometryTorus, materialTorus );
				torus.position.x = 2;
				scene.add( torus );

				// Lights
				const ambientLight = new THREE.AmbientLight( 0xffffff, 0.4 );
				scene.add( ambientLight );

				const directionalLight = new THREE.DirectionalLight( 0xffffff, 1.0 );
				directionalLight.position.set( 1, 1, 1 );
				scene.add( directionalLight );

				// Controls
				const controls = new OrbitControls( camera, renderer.domElement );
				controls.enableDamping = true;
				controls.dampingFactor = 0.05;

				// Window resize
				window.addEventListener( 'resize', onWindowResize );

				// Log info
				console.log( 'Renderer:', renderer.constructor.name );
				console.log( 'NodeMaterial support active:', renderer.isWebGLRendererWithNodes );

				animate();

			}

			function onWindowResize() {

				camera.aspect = window.innerWidth / window.innerHeight;
				camera.updateProjectionMatrix();

				renderer.setSize( window.innerWidth, window.innerHeight );

			}

			function animate() {

				requestAnimationFrame( animate );

				// Rotate objects
				box.rotation.x += 0.005;
				box.rotation.y += 0.01;

				sphere.rotation.y += 0.01;

				torus.rotation.x += 0.01;
				torus.rotation.y += 0.005;

				renderer.render( scene, camera );

			}

		</script>

	</body>
</html>
