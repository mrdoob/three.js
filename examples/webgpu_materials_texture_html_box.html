<!DOCTYPE html>
<html lang="en">

<head>
	<title>three.js webgpu - materials - html box texture</title>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
	<link type="text/css" rel="stylesheet" href="main.css">
	<style>
		body {
			background-color: #ffffff;
		}

		.draw-element {
			width: 600px;
			background-color: #aaaaaa;
			color: #000000;
			font-family: sans-serif;
			font-size: 30px;
			line-height: 1.5;
			text-align: center;
			padding: 30px;
			user-select: none;
			/* border: 10px solid #cccccc; */
		}

		.draw-element img {
			animation: swing 1s ease-in-out infinite alternate;
		}

		.draw-element input[type="text"] {
			-webkit-user-select: text;
			user-select: text;
			font-size: 24px;
			padding: 8px 12px;
			border: 2px solid #888;
			border-radius: 6px;
			width: 80%;
			margin-top: 10px;
		}

		.draw-element button {
			font-size: 24px;
			padding: 8px 20px;
			margin-top: 10px;
			border: none;
			border-radius: 6px;
			background-color: #4CAF50;
			color: white;
			cursor: pointer;
		}

		.draw-element button:hover {
			background-color: #2196F3;
		}

		@keyframes swing {
			from {
				transform: rotate(-15deg);
			}

			to {
				transform: rotate(15deg);
			}
		}
	</style>
</head>

<body>

	<div id="info">
		<a href="https://threejs.org" target="_blank" rel="noopener">three.js</a> - webgpu - HTMLTexture
	</div>

	<script type="importmap">
			{
				"imports": {
					"three": "../build/three.webgpu.js",
					"three/addons/": "./jsm/",
					"three/tsl": "../build/three.tsl.js"
				}
			}
		</script>

	<script type="module">

		import * as THREE from 'three';
		import { RoundedBoxGeometry } from 'three/addons/geometries/RoundedBoxGeometry.js';
		import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
		import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
		import { BoxInteractionManager } from 'three/addons/interaction/BoxInteractionManager.js';

		let camera, scene, renderer, mesh, interactions, controls;

		// Elements are appended inside the canvas (HTML-in-Canvas); document
		// stylesheets may not apply there, so selection is disabled inline.
		function disableSelection( root ) {

			root.style.userSelect = 'none';
			root.style.webkitUserSelect = 'none';
			root.style.webkitTouchCallout = 'none';

			root.addEventListener( 'selectstart', ( event ) => event.preventDefault() );

			for ( const child of root.querySelectorAll( '*' ) ) {

				if ( child.tagName === 'INPUT' || child.tagName === 'TEXTAREA' ) continue;

				child.style.userSelect = 'none';
				child.style.webkitUserSelect = 'none';

			}

			for ( const field of root.querySelectorAll( 'input, textarea' ) ) {

				field.style.userSelect = 'text';
				field.style.webkitUserSelect = 'text';

			}

		}

		init();

		async function init() {

			renderer = new THREE.WebGPURenderer({ antialias: true });
			await renderer.init();

			if (!('requestPaint' in renderer.domElement)) {

				info.innerHTML += '<br>This browser does not support the <a href="https://github.com/WICG/html-in-canvas" target="_blank">HTML-in-Canvas API</a>.';

			}

			renderer.toneMapping = THREE.NeutralToneMapping;
			renderer.setPixelRatio(window.devicePixelRatio);
			renderer.setSize(window.innerWidth, window.innerHeight);
			renderer.setAnimationLoop(animate);
			document.body.appendChild(renderer.domElement);

			camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 1, 2000);
			camera.position.z = 500;

			scene = new THREE.Scene();
			scene.background = new THREE.Color(0xaaaaaa);
			scene.environment = new THREE.PMREMGenerator(renderer).fromScene(new RoomEnvironment(), 0.02).texture;

			// HTML element
			const materials = []

			for (let i = 0; i < 6; i++) {
				const element = document.createElement( 'div' );
				element.className = 'draw-element';
				element.innerHTML = `
					Hello world ${i}!<br>I'm multi-line, <b>formatted</b>,
					rotated text with emoji (&#128512;), RTL text
					<span dir=rtl>من فارسی صحبت میکنم</span>,
					vertical text,
					<p style="writing-mode: vertical-rl;">
					这是垂直文本
					</p>
					an inline image (<img width="150" src="textures/758px-Canestra_di_frutta_(Caravaggio).jpg">), and
					<svg width="50" height="50">
					<circle cx="25" cy="25" r="20" fill="green" />
					<text x="25" y="30" font-size="15" text-anchor="middle" fill="#fff">
						SVG
					</text>
					</svg>!
					<br>
					<input type="text" placeholder="Type here...">
					<button>Click me</button>
				`;

				// Button click handler

				element.querySelector( 'button' ).addEventListener( 'click', function () {

					this.textContent = 'Clicked!';

				} );

				disableSelection( element );

				const material = new THREE.MeshStandardMaterial({ roughness: 0, metalness: 0.5 });
				material.map = new THREE.HTMLTexture(element);

				materials.push(material);

			}

			const geometry = new RoundedBoxGeometry(200, 200, 200, 10, 10);

			mesh = new THREE.Mesh(geometry, materials);
			scene.add(mesh);

			controls = new OrbitControls(camera, renderer.domElement);
			controls.minDistance = 300;
			controls.maxDistance = 1500;

			// Interaction

			interactions = new BoxInteractionManager();
			interactions.connect(renderer, camera);
			interactions.add(mesh);

			// E2E: deterministic-injection.js sets window.TESTING and a single frame.
			if ( window.TESTING ) {

				const style = document.createElement( 'style' );
				style.textContent = '.draw-element img { animation: none !important; transform: rotate( -15deg ); }';
				document.head.appendChild( style );

				controls.enabled = false;

			}

			window.addEventListener( 'resize', onWindowResize );

		}

		function onWindowResize() {

			camera.aspect = window.innerWidth / window.innerHeight;
			camera.updateProjectionMatrix();

			renderer.setSize(window.innerWidth, window.innerHeight);

		}

		function animate() {

			controls.update();

			interactions.update();

			renderer.render(scene, camera);

		}

	</script>

</body>

</html>
