<!DOCTYPE html>
<html lang="en">
	<head>
		<title>three.js webgpu - materialx loader</title>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
		<meta property="og:title" content="three.js webgpu - materialx loader">
		<meta property="og:type" content="website">
		<meta property="og:url" content="https://threejs.org/examples/webgpu_loader_materialx.html">
		<meta property="og:image" content="https://threejs.org/examples/screenshots/webgpu_loader_materialx.jpg">
		<link type="text/css" rel="stylesheet" href="example.css">
		<style>
			.dg .property-name {
				width: 20% !important;
			}
		</style>
	</head>
	<body>

		<div id="info">
			<a href="https://threejs.org/" target="_blank" rel="noopener" class="logo-link"></a>

			<div class="title-wrapper">
				<a href="https://threejs.org/" target="_blank" rel="noopener">three.js</a><span>MaterialX Loader</span>
			</div>

			<small>
				MaterialX Standard Surface loader.
			</small>
		</div>

		<script type="importmap">
			{
				"imports": {
					"three": "../build/three.webgpu.js",
					"three/webgpu": "../build/three.webgpu.js",
					"three/tsl": "../build/three.tsl.js",
					"three/addons/": "./jsm/"
				}
			}
		</script>

		<script type="module">

			import * as THREE from 'three/webgpu';

			import { Fn, abs, fract, fwidth, length, max, saturate, smoothstep, vec4, positionWorld, float } from 'three/tsl';

			import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

			import { HDRLoader } from 'three/addons/loaders/HDRLoader.js';
			import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

			import * as MikkTSpace from 'three/addons/libs/mikktspace.module.js';
			import { computeMikkTSpaceTangents } from 'three/addons/utils/BufferGeometryUtils.js';

			import { MaterialXLoader } from 'three/addons/loaders/MaterialXLoader.js';
			import { createStrictInterfaceValidator } from 'three/addons/loaders/materialx/MaterialXInterfaceValidation.js';

			import { Inspector } from 'three/addons/inspector/Inspector.js';

			const SAMPLE_PATH = 'https://raw.githubusercontent.com/materialx/MaterialX/main/resources/Materials/Examples/StandardSurface/';
			const LOCAL_SAMPLE_PATH = 'materialx/';
			const samples = [
				'standard_surface_brass_tiled.mtlx',
				'standard_surface_brick_procedural.mtlx',
				'standard_surface_carpaint.mtlx',
				//'standard_surface_chess_set.mtlx',
				'standard_surface_chrome.mtlx',
				'standard_surface_copper.mtlx',
				//'standard_surface_default.mtlx',
				//'standard_surface_glass.mtlx',
				//'standard_surface_glass_tinted.mtlx',
				'standard_surface_gold.mtlx',
				//'standard_surface_greysphere.mtlx',
				//'standard_surface_greysphere_calibration.mtlx',
				'standard_surface_jade.mtlx',
				//'standard_surface_look_brass_tiled.mtlx',
				//'standard_surface_look_wood_tiled.mtlx',
				'standard_surface_marble_solid.mtlx',
				'standard_surface_metal_brushed.mtlx',
				'standard_surface_plastic.mtlx',
				//'standard_surface_thin_film.mtlx',
				'standard_surface_velvet.mtlx',
				'standard_surface_wood_tiled.mtlx'
			];

			const localSamples = [
				'standard_surface_heightnormal.mtlx',
				'standard_surface_conditional_if_float.mtlx',
				'standard_surface_image_transform.mtlx',
				'standard_surface_color3_vec3_cm_test.mtlx',
				'standard_surface_rotate2d_test.mtlx',
				'standard_surface_rotate3d_test.mtlx',
				'standard_surface_heighttonormal_normal_input.mtlx',
				'standard_surface_roughness_test.mtlx',
				'standard_surface_opacity_test.mtlx',
				'standard_surface_opacity_only_test.mtlx',
				'standard_surface_specular_test.mtlx',
				'standard_surface_ior_test.mtlx',
				'standard_surface_combined_test.mtlx',
				'standard_surface_texture_opacity_test.mtlx',
				'standard_surface_transmission_test.mtlx',
				'standard_surface_transmission_only_test.mtlx',
				'standard_surface_transmission_rough.mtlx',
				'standard_surface_thin_film_rainbow_test.mtlx',
				'standard_surface_thin_film_ior_clamp_test.mtlx',
				'standard_surface_sheen_test.mtlx',
				'gltf_pbr_glass_dispersion.mtlx',
				'open_pbr_surface_velvet.mtlx',
				'open_pbr_surface_pearl.mtlx',
				'open_pbr_surface_honey.mtlx',
			];

			let camera, scene, renderer;
			let controls, prefab;
			const models = [];
			const strictInterfaceValidator = createStrictInterfaceValidator();

			init();

			function init() {

				const container = document.createElement( 'div' );
				document.body.appendChild( container );

				renderer = new THREE.WebGPURenderer( { antialias: true } );
				renderer.setPixelRatio( window.devicePixelRatio );
				renderer.setSize( window.innerWidth, window.innerHeight );
				renderer.toneMapping = THREE.LinearToneMapping;
				renderer.toneMappingExposure = .5;
				renderer.inspector = new Inspector();
				renderer.setAnimationLoop( render );
				container.appendChild( renderer.domElement );

				camera = new THREE.PerspectiveCamera( 45, window.innerWidth / window.innerHeight, 0.25, 200 );
				camera.position.set( 10, 10, 20 );

				scene = new THREE.Scene();
				scene.background = new THREE.Color( 0xffffff );

				// Ground plane

				const material = new THREE.MeshBasicNodeMaterial();

				const grid = Fn( ( [ coord, lineWidth = float( 0.01 ), dotSize = float( 0.03 ) ] ) => {

					// https://bgolus.medium.com/the-best-darn-grid-shader-yet-727f9278b9d8

					const g = fract( coord );
					const fw = fwidth( coord );
					const gx = abs( g.x.sub( 0.5 ) );
					const gy = abs( g.y.sub( 0.5 ) );

					const lineX = saturate( lineWidth.sub( gx ).div( fw.x ).add( 0.5 ) );
					const lineY = saturate( lineWidth.sub( gy ).div( fw.y ).add( 0.5 ) );
					const lines = max( lineX, lineY );

					const squareDist = max( gx, gy );
					const aa = max( fw.x, fw.y );
					const dots = smoothstep( dotSize.add( aa ), dotSize.sub( aa ), squareDist );

					return max( dots, lines );

				} );

				const fade = Fn( ( [ radius = float( 10.0 ), falloff = float( 1.0 ) ] ) => {

					return smoothstep( radius, radius.sub( falloff ), length( positionWorld ) );

				} );

				const gridColor = vec4( 0.5, 0.5, 0.5, 1.0 );
				const baseColor = vec4( 1.0, 1.0, 1.0, 0.0 );

				material.colorNode = grid( positionWorld.xz, 0.007, 0.03 ).mix( baseColor, gridColor ).mul( fade( 30.0, 20.0 ) );
				material.transparent = true;

				const plane = new THREE.Mesh( new THREE.CircleGeometry( 40 ), material );
				plane.rotation.x = - Math.PI / 2;
				plane.renderOrder = - 1;
				scene.add( plane );

				//

				controls = new OrbitControls( camera );
				controls.connect( renderer.domElement );
				controls.enableDamping = true;
				controls.minDistance = 2;
				controls.maxDistance = 40;

				//

				new HDRLoader()
					.setPath( 'textures/equirectangular/' )
					.load( 'san_giuseppe_bridge_2k.hdr', async ( texture ) => {

						texture.mapping = THREE.EquirectangularReflectionMapping;

						scene.environment = texture;

						prefab = ( await new GLTFLoader().loadAsync( './models/gltf/ShaderBall.glb' ) ).scene;
						await computePrefabTangents();

						for ( const sample of samples ) {

							await addSample( sample, SAMPLE_PATH );

						}

						for ( const sample of localSamples ) {

							await addSample( sample, LOCAL_SAMPLE_PATH );

						}

						addGUI();

					} );

				window.addEventListener( 'resize', onWindowResize );

			}

			async function computePrefabTangents() {

				await MikkTSpace.ready;

				prefab.traverse( function ( node ) {

					if ( node.isMesh === false ) return;

					const geometry = node.geometry;

					if ( geometry === undefined ) return;

					if ( geometry.hasAttribute( 'tangent' ) ) return;

					if ( geometry.hasAttribute( 'position' ) && geometry.hasAttribute( 'normal' ) && geometry.hasAttribute( 'uv' ) ) {

						computeMikkTSpaceTangents( geometry, MikkTSpace );

					}

				} );

			}

			function updateModelsAlign() {

				const COLUMN_COUNT = 6;
				const DIST_X = 3;
				const DIST_Z = 3;

				const lineCount = Math.floor( models.length / COLUMN_COUNT ) - 1.5;

				const offsetX = ( DIST_X * ( COLUMN_COUNT - 1 ) ) * - .5;
				const offsetZ = ( DIST_Z * lineCount ) * .5;

				for ( let i = 0; i < models.length; i ++ ) {

					const model = models[ i ];

					model.position.x = ( ( i % COLUMN_COUNT ) * DIST_X ) + offsetX;
					model.position.z = ( Math.floor( i / COLUMN_COUNT ) * - DIST_Z ) + offsetZ;

				}

			}

			function reportMaterialXLog( sample, materialName, log ) {

				if ( log.length === 0 ) return;

				const label = materialName ? `"${materialName}"` : `"${sample}"`;
				const errorCount = log.filter( ( entry ) => entry.severity === 'error' ).length;
				const warningCount = log.filter( ( entry ) => entry.severity === 'warning' ).length;
				console.groupCollapsed( `THREE.MaterialXLoader: ${errorCount} error(s), ${warningCount} warning(s) for ${label} (${sample})` );

				for ( const entry of log ) {

					const nodeName = entry.nodeName ? ` [${entry.nodeName}]` : '';
					const style = entry.severity === 'warning' ? 'color: #c90' : 'color: #c00';
					console[ entry.severity === 'warning' ? 'warn' : 'error' ]( `%c${entry.severity}: ${entry.code}${nodeName}: ${entry.message}`, style );

				}

				console.groupEnd();

			}

			async function addSample( sample, path ) {

				const model = prefab.clone();

				models.push( model );

				scene.add( model );

				updateModelsAlign();

				//

				const { materials, log } = await new MaterialXLoader()
					.setPath( path )
					.loadAsync( sample, {
						uvSpace: 'top-left',
						interfaceValidator: strictInterfaceValidator,
						throwOnErrors: false,
					} );
				const material = Object.values( materials ).pop();
				reportMaterialXLog( sample, material ? material.name : null, log );

				const calibrationMesh = model.getObjectByName( 'Calibration_Mesh' );
				calibrationMesh.material = material;

				const previewMesh = model.getObjectByName( 'Preview_Mesh' );
				previewMesh.material = material;

				if ( material.transparent ) {

					calibrationMesh.renderOrder = 1;
					previewMesh.renderOrder = 2;

				}

				await renderer.compileAsync( model, camera, scene );

			}

			function addGUI() {

				const gui = renderer.inspector.createParameters( 'MaterialX Loader' );

				const API = {
					showCalibrationMesh: true,
					showPreviewMesh: true
				};

				gui.add( API, 'showCalibrationMesh' )
					.name( 'Calibration Mesh' )
					.onChange( function ( value ) {

						setVisibility( 'Calibration_Mesh', value );

					} );

				gui.add( API, 'showPreviewMesh' )
					.name( 'Preview Mesh' )
					.onChange( function ( value ) {

						setVisibility( 'Preview_Mesh', value );

					} );

			}

			function setVisibility( name, visible ) {

				scene.traverse( function ( node ) {

					if ( node.isMesh ) {

						if ( node.name == name ) node.visible = visible;

					}

				} );

			}

			//

			function onWindowResize() {

				camera.aspect = window.innerWidth / window.innerHeight;
				camera.updateProjectionMatrix();

				renderer.setSize( window.innerWidth, window.innerHeight );

			}

			function render() {

				controls.update();
				renderer.render( scene, camera );

			}

		</script>

	</body>
</html>
