<!DOCTYPE html>
<html lang="en">
	<head>
		<title>three.js webgl - light probe volume</title>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
		<link type="text/css" rel="stylesheet" href="main.css">
	</head>
	<body>

		<div id="info">
			<a href="https://threejs.org" target="_blank" rel="noopener">three.js</a> - light probe volume<br/>
			Position-dependent diffuse global illumination via L1 SH probe grid
		</div>

		<script type="importmap">
			{
				"imports": {
					"three": "../build/three.module.js",
					"three/addons/": "./jsm/"
				}
			}
		</script>

		<script type="module">

			import * as THREE from 'three';

			import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
			import { GUI } from 'three/addons/libs/lil-gui.module.min.js';
			import { LightProbeVolume } from 'three/addons/lighting/LightProbeVolume.js';
			import { LightProbeVolumeHelper } from 'three/addons/helpers/LightProbeVolumeHelper.js';

			let camera, scene, renderer, controls;
			let probeGrid, probeGridHelper;

			init();

			async function init() {

				// Camera

				camera = new THREE.PerspectiveCamera( 50, window.innerWidth / window.innerHeight, 0.1, 100 );
				camera.position.set( 0, 3, 8 );

				// Scene

				scene = new THREE.Scene();
				scene.background = new THREE.Color( 0x111111 );

				// Room

				const wallMaterial = new THREE.MeshStandardMaterial( { color: 0xcccccc, side: THREE.BackSide } );
				const room = new THREE.Mesh( new THREE.BoxGeometry( 8, 5, 8 ), wallMaterial );
				room.position.y = 2.5;
				room.receiveShadow = true;
				scene.add( room );

				// Colored accent walls
				const redWall = new THREE.Mesh(
					new THREE.PlaneGeometry( 8, 5 ),
					new THREE.MeshStandardMaterial( { color: 0xdd2200 } )
				);
				redWall.rotation.y = Math.PI / 2;
				redWall.position.set( - 3.99, 2.5, 0 );
				scene.add( redWall );

				const blueWall = new THREE.Mesh(
					new THREE.PlaneGeometry( 8, 5 ),
					new THREE.MeshStandardMaterial( { color: 0x0044ff } )
				);
				blueWall.rotation.y = - Math.PI / 2;
				blueWall.position.set( 3.99, 2.5, 0 );
				scene.add( blueWall );

				// Objects

				const whiteMat = new THREE.MeshStandardMaterial( { color: 0xeeeeee } );

				// Columns
				const columnGeom = new THREE.CylinderGeometry( 0.3, 0.3, 4, 16 );
				for ( const x of [ - 2.5, 2.5 ] ) {

					for ( const z of [ - 2.5, 2.5 ] ) {

						const col = new THREE.Mesh( columnGeom, whiteMat );
						col.position.set( x, 2, z );
						col.castShadow = true;
						col.receiveShadow = true;
						scene.add( col );

					}

				}

				// Center table
				const tableTop = new THREE.Mesh(
					new THREE.BoxGeometry( 2.4, 0.12, 1.4 ),
					new THREE.MeshStandardMaterial( { color: 0x886644 } )
				);
				tableTop.position.set( 0, 1.0, 0 );
				tableTop.castShadow = true;
				tableTop.receiveShadow = true;
				scene.add( tableTop );

				const legGeom = new THREE.BoxGeometry( 0.1, 1, 0.1 );
				for ( const x of [ - 1.05, 1.05 ] ) {

					for ( const z of [ - 0.55, 0.55 ] ) {

						const leg = new THREE.Mesh( legGeom, tableTop.material );
						leg.position.set( x, 0.5, z );
						leg.castShadow = true;
						scene.add( leg );

					}

				}

				// Objects on table
				const sphere = new THREE.Mesh(
					new THREE.SphereGeometry( 0.3, 32, 32 ),
					new THREE.MeshStandardMaterial( { color: 0xffd700, metalness: 0.3, roughness: 0.4 } )
				);
				sphere.position.set( - 0.5, 1.36, 0 );
				sphere.castShadow = true;
				sphere.receiveShadow = true;
				scene.add( sphere );

				const torusKnot = new THREE.Mesh(
					new THREE.TorusKnotGeometry( 0.22, 0.08, 64, 16 ),
					new THREE.MeshStandardMaterial( { color: 0xff44aa, metalness: 0.2, roughness: 0.5 } )
				);
				torusKnot.position.set( 0.5, 1.36, 0 );
				torusKnot.castShadow = true;
				torusKnot.receiveShadow = true;
				scene.add( torusKnot );

				// Archway / partition wall
				const partitionMat = new THREE.MeshStandardMaterial( { color: 0xcccccc } );

				const pillarGeom = new THREE.BoxGeometry( 0.4, 4.5, 0.4 );
				const leftPillar = new THREE.Mesh( pillarGeom, partitionMat );
				leftPillar.position.set( 0, 2.25, - 2.8 );
				leftPillar.castShadow = true;
				leftPillar.receiveShadow = true;
				scene.add( leftPillar );

				// Stepped blocks near wall
				const step1 = new THREE.Mesh( new THREE.BoxGeometry( 1.5, 0.5, 1 ), whiteMat );
				step1.position.set( - 2.5, 0.25, 1.5 );
				step1.castShadow = true;
				step1.receiveShadow = true;
				scene.add( step1 );

				const step2 = new THREE.Mesh( new THREE.BoxGeometry( 1.0, 1.0, 1 ), whiteMat );
				step2.position.set( - 2.5, 0.5, 1.5 );
				step2.castShadow = true;
				step2.receiveShadow = true;
				scene.add( step2 );

				const step3 = new THREE.Mesh( new THREE.BoxGeometry( 0.5, 1.5, 1 ), whiteMat );
				step3.position.set( - 2.5, 0.75, 1.5 );
				step3.castShadow = true;
				step3.receiveShadow = true;
				scene.add( step3 );

				// Tall sculpture near blue wall
				const sculpture = new THREE.Mesh(
					new THREE.ConeGeometry( 0.4, 2.5, 5 ),
					new THREE.MeshStandardMaterial( { color: 0xeeeeee } )
				);
				sculpture.position.set( 2.5, 1.25, - 1 );
				sculpture.castShadow = true;
				sculpture.receiveShadow = true;
				scene.add( sculpture );

				// Lights
				const mainLight = new THREE.PointLight( 0xffffff, 30 );
				mainLight.position.set( 0, 4.5, 0 );
				mainLight.castShadow = true;
				mainLight.shadow.mapSize.setScalar( 256 );
				mainLight.shadow.radius = 12;
				mainLight.shadow.bias = - 0.002;
				scene.add( mainLight );

				const warmLight = new THREE.PointLight( 0xffaa44, 10 );
				warmLight.position.set( - 2, 3, - 2 );
				warmLight.castShadow = true;
				warmLight.shadow.mapSize.setScalar( 256 );
				warmLight.shadow.radius = 8;
				warmLight.shadow.bias = - 0.002;
				scene.add( warmLight );

				// Renderer

				renderer = new THREE.WebGLRenderer( { antialias: true } );
				renderer.setPixelRatio( window.devicePixelRatio );
				renderer.setSize( window.innerWidth, window.innerHeight );
				renderer.setAnimationLoop( animate );
				renderer.shadowMap.enabled = true;
				renderer.toneMapping = THREE.ACESFilmicToneMapping;
				renderer.toneMappingExposure = 1.0;
				document.body.appendChild( renderer.domElement );

				// Controls

				controls = new OrbitControls( camera, renderer.domElement );
				controls.target.set( 0, 2, 0 );
				controls.update();

				// Bake light probe volume

				const bounds = new THREE.Box3(
					new THREE.Vector3( - 3.8, 0.1, - 3.8 ),
					new THREE.Vector3( 3.8, 4.8, 3.8 )
				);

				async function bakeWithResolution( resolution ) {

					if ( probeGrid ) {

						scene.remove( probeGrid );
						probeGrid.dispose();

					}

					probeGrid = new LightProbeVolume( bounds, new THREE.Vector3( resolution, resolution, resolution ) );
					probeGrid.bake( renderer, scene, { cubemapSize: 32, near: 0.05, far: 20 } );
					probeGrid.visible = params.enabled;
					scene.add( probeGrid );

					// Update debug visualization

					if ( ! probeGridHelper ) {

						probeGridHelper = new LightProbeVolumeHelper( probeGrid );
						probeGridHelper.visible = params.showProbes;
						scene.add( probeGridHelper );

					} else {

						probeGridHelper.probeGrid = probeGrid;
						probeGridHelper.update();

					}

				}

				const params = {
					enabled: true,
					showProbes: false,
					resolution: 6
				};

				await bakeWithResolution( params.resolution );

				// GUI

				const gui = new GUI();
				gui.add( params, 'enabled' ).name( 'GI' ).onChange( ( value ) => {

					probeGrid.visible = value;

				} );
				gui.add( params, 'resolution', 2, 12, 1 ).name( 'Resolution' ).onFinishChange( ( value ) => {

					bakeWithResolution( value );

				} );
				gui.add( params, 'showProbes' ).name( 'Show Probes' ).onChange( ( value ) => {

					probeGridHelper.visible = value;

				} );

				//

				window.addEventListener( 'resize', onWindowResize );

			}

			function onWindowResize() {

				camera.aspect = window.innerWidth / window.innerHeight;
				camera.updateProjectionMatrix();

				renderer.setSize( window.innerWidth, window.innerHeight );

			}

			function animate() {

				renderer.render( scene, camera );

			}

		</script>
	</body>
</html>
