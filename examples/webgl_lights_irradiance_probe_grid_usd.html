<!DOCTYPE html>
<html lang="en">
	<head>
		<title>three.js webgl - irradiance probe grid (USD)</title>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
		<link type="text/css" rel="stylesheet" href="main.css">
	</head>
	<body>

		<div id="info">
			<a href="https://threejs.org" target="_blank" rel="noopener">three.js</a> - irradiance probe grid (USD)<br/>
			WASD to move, mouse to look
		</div>

		<script type="importmap">
			{
				"imports": {
					"three": "../build/three.module.js",
					"three/addons/": "./jsm/"
				}
			}
		</script>

		<script type="module">

			import * as THREE from 'three';

			import { FirstPersonControls } from 'three/addons/controls/FirstPersonControls.js';
			import { GUI } from 'three/addons/libs/lil-gui.module.min.js';
			import { USDLoader } from 'three/addons/loaders/USDLoader.js';
			import { IrradianceProbeGrid } from 'three/addons/lighting/IrradianceProbeGrid.js';
			import { IrradianceProbeGridHelper } from 'three/addons/helpers/IrradianceProbeGridHelper.js';

			let camera, scene, renderer, controls, timer;
			let probeGrid, probeGridHelper;

			init();

			async function init() {

				timer = new THREE.Timer();

				// Camera

				camera = new THREE.PerspectiveCamera( 60, window.innerWidth / window.innerHeight, 0.1, 500 );
				camera.position.set( 0, 5, 15 );

				// Scene

				scene = new THREE.Scene();
				scene.background = new THREE.Color( 0x87ceeb );

				// Load USD model

				const manager = new THREE.LoadingManager();
				manager.setURLModifier( ( url ) => {

					// Only modify bare filenames (textures referenced by the USD)
					if ( ! url.includes( '/' ) && ! url.startsWith( 'data:' ) && ! url.startsWith( 'blob:' ) ) {

						return '../temp/SampleScene/' + url;

					}

					return url;

				} );

				const loader = new USDLoader( manager );
				const model = await loader.loadAsync( '../temp/SampleScene/SampleScene.usd' );

				model.traverse( ( child ) => {

					if ( child.isMesh ) {

						child.castShadow = true;
						child.receiveShadow = true;

					}

				} );

				scene.add( model );

				// Lights

				const dirLight = new THREE.DirectionalLight( 0xffffff, 5 );
				dirLight.position.set( 20, 40, 20 );
				dirLight.castShadow = true;
				dirLight.shadow.mapSize.setScalar( 2048 );
				dirLight.shadow.radius = 8;
				dirLight.shadow.bias = - 0.001;
				dirLight.shadow.camera.left = - 50;
				dirLight.shadow.camera.right = 50;
				dirLight.shadow.camera.top = 50;
				dirLight.shadow.camera.bottom = - 50;
				dirLight.shadow.camera.near = 0.1;
				dirLight.shadow.camera.far = 100;
				scene.add( dirLight );

				const hemiLight = new THREE.HemisphereLight( 0x87ceeb, 0x362907, 1.0 );
				scene.add( hemiLight );

				const ambient = new THREE.AmbientLight( 0xffffff, 0.3 );
				scene.add( ambient );

				// Renderer

				renderer = new THREE.WebGLRenderer( { antialias: true } );
				renderer.setPixelRatio( window.devicePixelRatio );
				renderer.setSize( window.innerWidth, window.innerHeight );
				renderer.setAnimationLoop( animate );
				renderer.shadowMap.enabled = true;
				renderer.toneMapping = THREE.ACESFilmicToneMapping;
				renderer.toneMappingExposure = 1.0;
				document.body.appendChild( renderer.domElement );

				// Controls

				controls = new FirstPersonControls( camera, renderer.domElement );
				controls.movementSpeed = 10;
				controls.lookSpeed = 0.1;

				// Bake irradiance probe grid

				const probeBounds = new THREE.Box3(
					new THREE.Vector3( - 40, 0, - 18 ),
					new THREE.Vector3( 60, 16, 18 )
				);

				const params = {
					enabled: true,
					showProbes: false,
					resolution: 6
				};

				async function bakeWithResolution( resolution ) {

					if ( probeGrid ) probeGrid.dispose();

					probeGrid = new IrradianceProbeGrid( probeBounds, new THREE.Vector3( resolution * 2, resolution, resolution ) );
					probeGrid.bake( renderer, scene, { cubemapSize: 32, near: 0.05, far: 100 } );

					scene.irradianceProbeGrid = params.enabled ? probeGrid : null;

					// Update debug visualization

					if ( ! probeGridHelper ) {

						probeGridHelper = new IrradianceProbeGridHelper( probeGrid, 0.3 );
						probeGridHelper.visible = params.showProbes;
						scene.add( probeGridHelper );

					} else {

						probeGridHelper.probeGrid = probeGrid;
						probeGridHelper.update();

					}

				}

				await bakeWithResolution( params.resolution );

				// GUI

				const gui = new GUI();
				gui.add( params, 'enabled' ).name( 'GI' ).onChange( ( value ) => {

					scene.irradianceProbeGrid = value ? probeGrid : null;

				} );
				gui.add( params, 'resolution', 2, 12, 1 ).name( 'Resolution' ).onFinishChange( ( value ) => {

					bakeWithResolution( value );

				} );
				gui.add( params, 'showProbes' ).name( 'Show Probes' ).onChange( ( value ) => {

					probeGridHelper.visible = value;

				} );

				//

				window.addEventListener( 'resize', onWindowResize );

			}

			function onWindowResize() {

				camera.aspect = window.innerWidth / window.innerHeight;
				camera.updateProjectionMatrix();

				renderer.setSize( window.innerWidth, window.innerHeight );

			}

			function animate( timestamp ) {

				timer.update( timestamp );
				controls.update( timer.getDelta() );
				renderer.render( scene, camera );

			}

		</script>
	</body>
</html>
