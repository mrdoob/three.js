<!DOCTYPE html>
<html lang="en">
	<head>
		<title>three.js webgl - modifier - simplify modifier</title>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
		<meta property="og:title" content="three.js webgl - modifier - simplify modifier">
		<meta property="og:type" content="website">
		<meta property="og:url" content="https://threejs.org/examples/webgl_modifier_simplifier.html">
		<meta property="og:image" content="https://threejs.org/examples/screenshots/webgl_modifier_simplifier.jpg">
		<link type="text/css" rel="stylesheet" href="main.css">
	</head>
	<body>

		<div id="info"><a href="https://threejs.org" target="_blank" rel="noopener">threejs</a> - Polygon Reduction using MeshoptSimplifier</div>

		<script type="importmap">
			{
				"imports": {
					"three": "../build/three.module.js",
					"three/addons/": "./jsm/"
				}
			}
		</script>

		<script type="module">

			import * as THREE from 'three';

			import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
			import { GUI } from 'three/addons/libs/lil-gui.module.min.js';
			import { MeshoptSimplifier } from 'three/addons/libs/meshopt_simplifier.module.js';
			import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

			let renderer, scene, camera;

			init();

			function init() {

				renderer = new THREE.WebGLRenderer( { antialias: true } );
				renderer.setPixelRatio( window.devicePixelRatio );
				renderer.setSize( window.innerWidth, window.innerHeight );
				document.body.appendChild( renderer.domElement );

				scene = new THREE.Scene();

				camera = new THREE.PerspectiveCamera( 40, window.innerWidth / window.innerHeight, 1, 1000 );
				camera.position.z = 15;

				const controls = new OrbitControls( camera, renderer.domElement );
				controls.addEventListener( 'change', render ); // use if there is no animation loop
				controls.enablePan = false;
				controls.enableZoom = false;

				scene.add( new THREE.AmbientLight( 0xffffff, 0.6 ) );

				const light = new THREE.PointLight( 0xffffff, 400 );
				camera.add( light );
				scene.add( camera );

				new GLTFLoader().load( 'models/gltf/LeePerrySmith/LeePerrySmith.glb', async function ( gltf ) {

					await MeshoptSimplifier.ready;

					const mesh = gltf.scene.children[ 0 ];
					mesh.position.x = - 3;
					mesh.rotation.y = Math.PI / 2;
					scene.add( mesh );

					const simplified = mesh.clone();
					simplified.material = simplified.material.clone();
					simplified.material.flatShading = true;
					simplified.geometry = mesh.geometry.clone();

					simplified.position.x = 3;
					simplified.rotation.y = - Math.PI / 2;
					scene.add( simplified );

					const sourceIndices = mesh.geometry.getIndex().array;
					const sourcePositions = mesh.geometry.getAttribute( 'position' ).array;

					const params = { ratio: 0.125 };

					function simplify() {

						const targetIndexCount = Math.max( 3, Math.floor( sourceIndices.length * params.ratio / 3 ) * 3 );

						const [ indices ] = MeshoptSimplifier.simplify( sourceIndices, sourcePositions, 3, targetIndexCount, 1 );

						simplified.geometry.setIndex( new THREE.BufferAttribute( indices, 1 ) );

						render();

					}

					simplify();

					const gui = new GUI();
					gui.add( params, 'ratio', 0.01, 1, 0.01 ).onChange( simplify );

				} );

				window.addEventListener( 'resize', onWindowResize );

			}

			function onWindowResize() {

				renderer.setSize( window.innerWidth, window.innerHeight );

				camera.aspect = window.innerWidth / window.innerHeight;
				camera.updateProjectionMatrix();

				render();

			}

			function render() {

				renderer.render( scene, camera );

			}

		</script>

	</body>
</html>
