<!DOCTYPE html>
<html lang="en">
<head>
    <title>three.js WASM - 1000 Phong Cubes</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { margin: 0; background: #1a1a2e; color: #e0e0e0; font-family: monospace; }
        canvas { display: block; }
        #info { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); padding: 8px 12px; border-radius: 4px; font-size: 14px; }
    </style>
</head>
<body>
    <div id="info">WASM Three.js — 1000 Phong Cubes</div>
    <script type="importmap">
    {
        "imports": {
            "three": "../src/Three.js"
        }
    }
    </script>
    <script type="module">
        import * as THREE from 'three';

        const canvas = document.createElement('canvas');
        document.body.appendChild(canvas);
        const renderer = new THREE.WebGLRenderer(new THREE.WebGLAdapter(canvas));
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, canvas.width/canvas.height, 0.1, 100);
        camera.position.set(0, 0, 5);
        scene.add(camera);

        const h = 0.5;
        const verts = [
            h,-h, h,  h,-h,-h,  h, h,-h,  h, h, h,
           -h,-h,-h, -h,-h, h, -h, h, h, -h, h,-h,
           -h, h, h,  h, h, h,  h, h,-h, -h, h,-h,
           -h,-h,-h,  h,-h,-h,  h,-h, h, -h,-h, h,
           -h,-h, h,  h,-h, h,  h, h, h, -h, h, h,
            h,-h,-h, -h,-h,-h, -h, h,-h,  h, h,-h,
        ];
        const idxs = [];
        for (let f = 0; f < 6; f++) { const b = f * 4; idxs.push(b, b+1, b+2, b, b+2, b+3); }

        const COUNT = 1000;
        const t0 = performance.now();

        for (let i = 0; i < COUNT; i++) {
            const mesh = new THREE.Mesh();
            mesh.setGeometry(verts, idxs);
            mesh.setMaterial(Math.random(), Math.random(), Math.random(), 1, 0.3, 0.3, 0.3, 30, 1);
            mesh.position.set((i - COUNT/2) * 0.05, 0, (i % 10) * 0.1 - 0.5);
            scene.add(mesh);
            mesh.updateMatrixWorld(true);
        }
        camera.updateMatrixWorld(true);

        scene._lights = [
            { light_type: 0, color: [0.2, 0.2, 0.2], intensity: 1, direction: [0, 0, 0] },
            { light_type: 1, color: [1, 0.8, 0.6], intensity: 1, direction: [0.5, 0.5, 1] },
            { light_type: 1, color: [0.3, 0.5, 1], intensity: 0.8, direction: [-0.3, -0.2, -1] },
        ];

        const t1 = performance.now();
        const glCommands = renderer.render(scene, camera);
        const t2 = performance.now();

        document.getElementById('info').innerHTML =
            `WASM Three.js — ${COUNT} Phong Cubes<br>` +
            `Setup: ${(t1-t0).toFixed(1)}ms | Render: ${(t2-t1).toFixed(1)}ms | GL: ${glCommands?.length||0} bytes`;

        // Orbit
        let angle = 0;
        function animate() {
            angle += 0.005;
            camera.position.x = Math.sin(angle) * 5;
            camera.position.z = Math.cos(angle) * 5;
            camera.position.set(camera.position.x, 0, camera.position.z);
            camera.updateMatrixWorld(true);
            const gc = renderer.render(scene, camera);
            if (gc) { const ad = renderer.adapter; ad.execute(gc); }
            requestAnimationFrame(animate);
        }
        animate();
    </script>
</body>
</html>
