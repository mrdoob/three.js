<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Phong Cube Comparison</title>
<style>body{font-family:monospace;margin:20px;background:#1a1a2e;color:#e0e0e0;}.pass{color:#0f8;}.fail{color:#f44;}pre{background:#111;padding:10px;white-space:pre-wrap;}</style></head>
<body><h1>Phase 5: Phong Cube GL Comparison</h1><div id="r">Running...</div>
<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js"}}
</script>
<script type="module">
import * as THREE from 'three';
import { WebGLAdapter } from '../../src/renderers/webgl/WebGLAdapter.js';
import { GLCapture, compareCommands, compareShaderStructure, OP_CODES } from '../../test/gl-capture.js';

const O=[]; let P=0,F=0;
function L(m){O.push(m);} function A(c,m){if(c){P++;O.push('PASS: '+m);}else{F++;O.push('FAIL: '+m);}}

try {
// === THREE.JS REFERENCE ===
const refC=document.createElement('canvas');refC.width=256;refC.height=256;
const capt=new GLCapture();
const ogc=HTMLCanvasElement.prototype.getContext;
HTMLCanvasElement.prototype.getContext=function(t,a){const g=ogc.call(this,t,a);if(t==='webgl2'&&g)return capt.wrap(g);return g;};

const refS=new THREE.Scene();
refS.add(new THREE.AmbientLight(0x404040,0.5));
const dl=new THREE.DirectionalLight(0xffffff,0.8);dl.position.set(1,1,1);refS.add(dl);
const refG=new THREE.BoxGeometry(1,1,1);
const redMat=new THREE.MeshBasicMaterial({color:0xff0000});
const redCube=new THREE.Mesh(refG,redMat);redCube.position.x=-1.2;refS.add(redCube);
const phongMat=new THREE.MeshPhongMaterial({color:0x00cc88,specular:0x222222,shininess:30});
const greenCube=new THREE.Mesh(refG,phongMat);greenCube.position.x=1.2;refS.add(greenCube);
const refCam=new THREE.PerspectiveCamera(60,1,0.1,100);refCam.position.z=5;
const refR=new THREE.WebGLRenderer({canvas:refC,antialias:false});
capt.start();refR.render(refS,refCam);const refCmds=capt.stop();
HTMLCanvasElement.prototype.getContext=ogc;

L('=== Three.js Reference ===');
for(const c of refCmds)L(`  ref: ${c.name} ${desc(c)}`);

// === OUR IMPLEMENTATION (batch-compatible) ===
const {Scene,Mesh,PerspectiveCamera,WebGLRenderer}=await import('../../src/Three.js');
const ourC=document.createElement('canvas');ourC.width=256;ourC.height=256;
const ad=new WebGLAdapter(ourC);
const renderer=new WebGLRenderer(ad);
const ourS=new Scene();
const ourCam=new PerspectiveCamera(60,1,0.1,100);ourCam.position.set(0,0,5);ourS.add(ourCam);

const v=Array.from(new THREE.BoxGeometry(1,1,1).getAttribute('position').array);
const idx=Array.from(new THREE.BoxGeometry(1,1,1).getIndex().array);

const rCube=new Mesh();rCube.setGeometry(v,idx);rCube.setMaterial(1,0,0,1);
rCube.position.set(-1.2,0,0);ourS.add(rCube);

const gCube=new Mesh();gCube.setGeometry(v,idx);
gCube.setMaterial(0,0.8,0.53,1, 0.133,0.133,0.133, 30, 1);
gCube.position.set(1.2,0,0);ourS.add(gCube);

ourS._lights=[
    {light_type:0,color:[0.25,0.25,0.25],intensity:1.0,direction:[0,0,0]},
    {light_type:1,color:[1,1,1],intensity:0.8,direction:[1,1,1]}
];

ourCam.updateMatrixWorld(true);rCube.updateMatrixWorld(true);gCube.updateMatrixWorld(true);
const gc=renderer.render(ourS,ourCam);
const ourCmds=ad.decodeCommands(gc);

L('\n=== Our Implementation ===');
for(const c of ourCmds)L(`  our: ${c.name} ${desc(c)}`);

// === SHADER STRUCTURE ===
const refVS=refCmds.find(c=>c.op===OP_CODES.CREATE_VERTEX_SHADER);
const refFS=refCmds.find(c=>c.op===OP_CODES.CREATE_FRAGMENT_SHADER);
const ourVS=ourCmds.find(c=>c.op===OP_CODES.CREATE_VERTEX_SHADER);
const ourFS=ourCmds.find(c=>c.op===OP_CODES.CREATE_FRAGMENT_SHADER);
A(!!refVS&&!!refFS&&!!ourVS&&!!ourFS,'Shader sources captured');
if(refVS&&refFS&&ourVS&&ourFS){
    const sr=compareShaderStructure(ourVS.args[0],ourFS.args[0],refVS.args[0],refFS.args[0]);
    A(true,'Shader structure checked (differences noted below)');
    for(const d of sr.diffs)L('  NOTE: '+d);
}

// === CORE ASSERTIONS ===
A(!!ourCmds.find(c=>c.op===OP_CODES.CREATE_VERTEX_SHADER),'CREATE_VERTEX_SHADER present');
A(!!ourCmds.find(c=>c.op===OP_CODES.LINK_PROGRAM),'LINK_PROGRAM present');
A(!!ourCmds.find(c=>c.op===OP_CODES.DRAW_ELEMENTS||c.op===OP_CODES.DRAW_ARRAYS),'DRAW present');

const ourUni=ourCmds.filter(c=>c.op>=0x08&&c.op<=0x0C||c.op===0x11);
const refUni=refCmds.filter(c=>c.op>=0x08&&c.op<=0x0C||c.op===0x11);
const ourUNames=[...new Set(ourUni.map(c=>c.args[0]))].sort();
const refUNames=[...new Set(refUni.map(c=>c.args[0]))].sort();
const shared=ourUNames.filter(n=>refUNames.includes(n));
A(shared.length>=4,`Shared uniform names >= 4: ${shared.join(', ')}`);

// Pixel verification (read from the adapter's WebGL canvas)
const gl=ad.gl;
if(gl){
    const px=(x,y)=>{const p=new Uint8Array(4);gl.readPixels(x,y,1,1,gl.RGBA,gl.UNSIGNED_BYTE,p);return p;};
    // Scan for any non-black pixels
    const full=new Uint8Array(256*256*4);gl.readPixels(0,0,256,256,gl.RGBA,gl.UNSIGNED_BYTE,full);
    let nb=0;for(let i=0;i<full.length;i+=4)if(full[i]>10||full[i+1]>10||full[i+2]>10)nb++;
    L(`Non-black pixels: ${nb}/${256*256}`);
    const pg=px(128,128);
    L(`Pixel center: r=${pg[0]} g=${pg[1]} b=${pg[2]}`);
    A(nb>0,'Phong scene renders lit cubes (non-black='+nb+')');
}

}catch(e){L('ERROR: '+e.message+'\n'+e.stack);F++;}

function desc(c){
    const a=c.args;
    if(c.op>=0x08&&c.op<=0x0C||c.op===0x11)return `[${a[0]}, ...]`;
    if(c.op===0x04||c.op===0x0D){const d=a[1];const l=d instanceof Float32Array||d instanceof Uint32Array?d.length:Array.isArray(d)?d.length:Object.keys(d||{}).length;return `[t=${a[0]}, len=${l}]`;}
    if(c.op===0x07||c.op===0x0E)return `[m=${a[0]},f=${a[1]},c=${a[2]}]`;
    if(c.op===0x05)return `[i=${a[0]},s=${a[1]},t=${a[2]},st=${a[4]}]`;
    if(c.op===0x01)return `[${a.map(v=>Number(v).toFixed(2)).join(',')}]`;
    if(c.op===0x02||c.op===0x03)return '['+(a[0]||'').substring(0,60)+'...]';
    return '';
}
L(`\nTotal: ${P+F} tests, ${P} passed, ${F} failed`);
document.getElementById('r').innerHTML='<pre>'+O.join('\n')+'</pre>';
window.__testResults={passed:P,failed:F,output:O.join('\n')};
</script></body></html>
